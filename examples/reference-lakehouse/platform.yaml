  ownership: managed
  providerInstanceRef: ProviderInstance/reference-cdc
  replicas: 1
  resources:
    cpus: "1"
    memory: 1g
    pidsLimit: 256
  parameters:
    ports: [127.0.0.1:18083:8083]
  verification:
    checks:
      - id: CDC-RUNTIME-REFERENCE
        description: Kafka Connect control endpoint reports connector and task health
