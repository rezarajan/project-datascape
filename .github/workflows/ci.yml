name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Unit tests
        run: go test ./...
      - name: Race tests
        run: go test -race ./...
      - name: Vet
        run: go vet ./...
      - name: Build
        run: make build VERSION=ci SOURCE_COMMIT="${GITHUB_SHA}"
      - name: Generate HTML documentation
        run: make docs
      - name: Generate reference lakehouse
        run: |
          ./bin/platformctl generate --platform examples/reference-lakehouse/platform.yaml --profile profiles/reference.yaml --output dist/reference
          cp -R examples/reference-lakehouse/jobs dist/reference/jobs
          mkdir -p dist/reference/state/sqlite
          ./bin/platformctl secrets init --bundle dist/reference --development
      - name: Validate generated Compose
        working-directory: dist/reference
        run: docker compose --env-file .env --profile governance config --quiet
      - name: Integration tests
        run: go test -tags=integration ./...
      - name: Terminology and determinism
        run: |
          make terminology-check
          make determinism-check
      - name: Upload HTML documentation
        uses: actions/upload-artifact@v4
        with:
          name: datascape-html-documentation
          path: dist/docs
          if-no-files-found: error
